name = "call-logger-ingest"
main = "src/index.ts"
compatibility_date = "2024-11-06"

# --- Non-secret configuration -------------------------------------------------
# The GraphQL endpoint of the cravingsv2 Hasura instance.
[vars]
HASURA_GRAPHQL_URL = "https://hasura-prod-v2.cravings.live/v1/graphql"
# Optional least-privilege role — requires configuring a 'call_ingest' role's permissions
# in Hasura (see hasura/call_logs.sql). Unset = use admin (works out of the box).
# HASURA_ROLE = "call_ingest"
# Meta Graph API version (from cravings WHATSAPP_API_VERSION).
GRAPH_API_VERSION = "v22.0"

# Cron: advance flow steps + dispatch scheduled messages every minute.
[triggers]
crons = ["* * * * *"]

# --- KV: per-device token store (minted by /register) -------------------------
# Create with:  npx wrangler kv namespace create TOKENS
# then paste the returned id below.
[[kv_namespaces]]
binding = "TOKENS"
id = "5a1bd8ab5e054165a6d23f783a4b9418"

# --- Rate limiting: per-account throttle on /ingest ---------------------------
# 300 requests / 60s keyed by account email. Bounds abuse/amplification even
# when a valid app key is presented. namespace_id is any unique integer string.
[[unsafe.bindings]]
name = "INGEST_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 300, period = 60 }

# NOTE: Free plan — no Cloudflare Queues. /ingest writes to Hasura inline.
# To enable queue-based ingestion later (Workers Paid), re-add [[queues.producers]] +
# [[queues.consumers]] and the queue() handler, and create the queues with wrangler.

# --- SECRETS (do NOT put these here; set them out-of-band) ---------------------
#   npx wrangler secret put HASURA_ADMIN_SECRET
#   npx wrangler secret put INGEST_APP_KEY
#   npx wrangler secret put ADMIN_API_KEY
