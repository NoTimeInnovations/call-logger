name: Build APK

# Builds an installable debug APK in the cloud on every push to main,
# and on demand via the "Run workflow" button. Each build is published
# as a GitHub Release with the APK attached for easy download.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Required so the workflow can create releases and upload assets via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          INGEST_APP_KEY: ${{ secrets.INGEST_APP_KEY }}
          # Drives versionCode/versionName so it matches the v1.0.<run> release tag
          # that the in-app OTA updater compares against.
          GH_RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK with versioned name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/call-logger-v1.0.${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: call-logger-debug-apk
          path: dist/call-logger-v1.0.${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          body: |
            Automated debug build.
            Commit: ${{ github.sha }}
          files: dist/call-logger-v1.0.${{ github.run_number }}.apk
          make_latest: true
