name: Build APK

# Builds an installable debug APK in the cloud on every push to main,
# and on demand via the "Run workflow" button.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          INGEST_APP_KEY: ${{ secrets.INGEST_APP_KEY }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: call-logger-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
